        // Image compression to prevent hitting Firestore 1MB limits
        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_SIZE = 600; // Resize to max 600px
                    if (width > height && width > MAX_SIZE) {
                        height *= MAX_SIZE / width; width = MAX_SIZE;
                    } else if (height > MAX_SIZE) {
                        width *= MAX_SIZE / height; height = MAX_SIZE;
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6)); // Compress to 60% quality JPEG
                };
                img.src = e.target.result;
            };
            reader.onerror = error => reject(error);
        });

        const calculateAge = (dob) => {
            if (!dob) return '';
            const diff = Date.now() - new Date(dob).getTime();
            return Math.abs(new Date(diff).getUTCFullYear() - 1970);
        };

        const exportCSV = (filename, rows) => {
            const processRow = row => row.map(val => `"${(val || '').toString().replace(/"/g, '""')}"`).join(',');
            const csvContent = '\uFEFF' + rows.map(processRow).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", filename + ".csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        // --- Initial Data ---

            ],

                { id: 'z2', name: 'តំបន់ទី២ (Zone 2)', locations: [{ id: 'l3', name: 'អគាររដ្ឋាភិបាល' }] }

        // --- UI Components ---
        const Input = ({ label, type = 'text', name, value, onChange, required, placeholder, className="" }) => html`

        // --- ID Card Template ---

        const LoginScreen = ({ onLogin, settings }) => {

                const file = e.target.files[0];

            const handleSubmit = (e) => {

            return html`
                <form onSubmit="${handleSubmit}" class="relative z-10">

                            <${Input} label="លេខទូរស័ព្ទ" value="${formData.phone}" onChange="${v => setFormData({...formData, phone: v})}" required />
                            <div class="md:col-span-2"><${Input} label="អាសយដ្ឋានបច្ចុប្បន្ន" value="${formData.address}" onChange="${v => setFormData({...formData, address: v})}" /></div>
                            <${Input} label="ថ្ងៃចូលបម្រើការងារ" type="date" value="${formData.startDate}" onChange="${v => setFormData({...formData, startDate: v})}" required />
                            <${Select} label="វេនការងារ" value="${formData.shift}" onChange="${v => setFormData({...formData, shift: v})}" options="${[{value:'day', label:'វេនថ្ងៃ ☀️'}, {value:'night', label:'វេនយប់ 🌙'}]}" required />
                        </div>

                    <div class="mt-6 flex justify-end gap-3">
                        ${!isTab && html`<${Button} variant="secondary" onClick="${onCancel}">បោះបង់</${Button}>`}

                    </div>

        };

        const AdminDashboard = ({ appData, updateData, overwriteData, onLogout }) => {
            const [currentTab, setCurrentTab] = useState('overview');

            const tabs = [
                { id: 'overview', label: 'ផ្ទាំងសង្ខេបកណ្តាល', icon: '📊' },

                { id: 'guards', label: 'បញ្ជីសន្តិសុខ (Ledger)', icon: '👮' },

            const renderContent = () => {

                    case 'guards': return html`<${AdminGuards} data="${appData}" updateData="${updateData}" />`;
                    case 'zones': return html`<${AdminZones} data="${appData}" updateData="${updateData}" />`;
                    case 'schedules': return html`<${AdminSchedules} data="${appData}" updateData="${updateData}" />`;
                    case 'reports': return html`<${AdminReports} data="${appData}" />`;

            };

            return html`

                            <div class="flex items-center gap-3">

                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                                </button>
                                <h2 class="text-sm md:text-base font-bold text-[#0067c0] uppercase tracking-wide hidden md:block">KAMPOT SECURITY AGENT CO., LTD. SYSTEM</h2>

                                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#0067c0] to-blue-400 text-white flex items-center justify-center font-bold text-xs shadow-md border border-white">AD</div>

        };

        const AdminOverview = ({ data, setCurrentTab }) => {
            const chartRef = useRef(null);
            const totalGuards = data.guards.length;
            const todayCheckIns = data.checkIns.filter(c => new Date(c.timestamp).toDateString() === new Date().toDateString()).length;
            const absent = Math.max(0, totalGuards - todayCheckIns);
            const male = data.guards.filter(g => g.gender === 'ប្រុស').length;
            const female = data.guards.filter(g => g.gender === 'ស្រី').length;
            const [aiInsight, setAiInsight] = useState('');

            useEffect(() => {
                const ctx = chartRef.current.getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['ចន្ទ','អង្គារ','ពុធ','ព្រហ','សុក្រ','សៅរ៍','អាទិត្យ'], datasets: [{ label: 'វត្តមាន', data: [todayCheckIns-2, todayCheckIns+1, todayCheckIns, todayCheckIns-1, todayCheckIns+2, todayCheckIns-1, todayCheckIns], borderColor: '#0067c0', tension: 0.4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }, [todayCheckIns]);

            const runAI = () => {
                setAiInsight('កំពុងវិភាគទិន្នន័យ... ⏳');
                setTimeout(() => setAiInsight(`ការវិភាគរួចរាល់៖ \n- អត្រាវត្តមានបុគ្គលិកថ្ងៃនេះមានភាពល្អប្រសើរ។\n- មានសន្តិសុខ ${absent} នាក់អវត្តមាន សូមពិនិត្យមើលបញ្ជីឈ្មោះ។\n- ចំណុចខ្សោយ៖ វេនយប់មានបុគ្គលិកតិចតួច។ គួរតែបន្ថែម។`), 1500);
            };

            return html`
                <div class="space-y-6 animate-fade-in">
                    <!-- Top Stats -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
                        <div class="win-mica p-5 md:p-6 rounded-3xl relative overflow-hidden group border border-white/80">
                            <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-400/20 rounded-full blur-2xl"></div>
                            <p class="text-slate-500 text-xs md:text-sm font-bold mb-1">⚖️ របាយការណ៍សរុប (ID)</p>
                            <h4 class="text-2xl md:text-3xl font-extrabold text-emerald-600 font-mono">${totalGuards}</h4>
                        </div>
                        <div class="win-mica p-5 md:p-6 rounded-3xl relative overflow-hidden group border border-white/80">
                            <div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-400/20 rounded-full blur-2xl"></div>
                            <p class="text-slate-500 text-xs md:text-sm font-bold mb-1">📉 វត្តមានសរុបថ្ងៃនេះ</p>
                            <h4 class="text-2xl md:text-3xl font-extrabold text-[#0067c0] font-mono">${todayCheckIns}</h4>
                        </div>
                        <div class="win-mica p-5 md:p-6 rounded-3xl relative overflow-hidden group border border-[#0067c0]/30 shadow-md">
                            <div class="absolute -right-4 -top-4 w-24 h-24 bg-rose-400/20 rounded-full blur-2xl"></div>
                            <p class="text-slate-500 text-xs md:text-sm font-bold mb-1">📉 អវត្តមានសរុបថ្ងៃនេះ</p>
                            <h4 class="text-2xl md:text-3xl font-extrabold text-rose-600 font-mono">${absent}</h4>
                        </div>
                        <div class="win-mica p-5 md:p-6 rounded-3xl relative overflow-hidden group border border-white/80">
                            <p class="text-slate-500 text-xs md:text-sm font-bold mb-1">👥 បុគ្គលិក/សន្តិសុខសរុប</p>
                            <h4 class="text-2xl md:text-3xl font-extrabold text-slate-800">${totalGuards} <span class="text-base">នាក់</span></h4>
                            <div class="flex gap-4 mt-2 text-xs font-bold text-slate-500">
                                <span>ប្រុស: <span class="text-blue-500">${male}</span></span> <span>ស្រី: <span class="text-pink-500">${female}</span></span>
                            </div>
                        </div>
                    </div>

                    <!-- AI Advisor -->
                    <div class="win-mica p-5 md:p-6 rounded-3xl border border-[#0067c0]/30 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 text-7xl">✨</div>
                        <h3 class="font-bold text-slate-800 mb-2 flex items-center gap-2 relative z-10">🤖 ទីប្រឹក្សាគ្រប់គ្រងការងារដោយ AI (Gemini)</h3>
                        <p class="text-sm text-slate-500 mb-4 relative z-10">វិភាគទិន្នន័យដើម្បីរកភាពមិនប្រក្រតី ឬឱកាសបង្កើនការងារ ចំណុចខ្សោយ ចំណុចខ្លាំង ។</p>
                        <button onClick="${runAI}" class="win-btn-primary px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 relative z-10">✨ ចាប់ផ្តើមវិភាគឥឡូវនេះ</button>
                        ${aiInsight && html`<div class="mt-4 text-sm text-slate-700 bg-white/60 p-4 rounded-2xl border border-blue-100 shadow-inner whitespace-pre-line relative z-10">${aiInsight}</div>`}
                    </div>

                    <!-- Bottom Section -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 win-mica p-5 md:p-6 rounded-3xl border border-white/80 overflow-hidden">

                            <div class="h-60 w-full bg-white/40 rounded-2xl p-4 border border-white/60 shadow-inner relative"><canvas ref="${chartRef}"></canvas></div>
                        </div>
                        <div class="win-mica p-5 md:p-6 rounded-3xl border border-white/80 flex flex-col">
                            <h3 class="font-bold text-slate-800 mb-4 border-b border-black/5 pb-2">⚡ ប្រតិបត្តិការរហ័ស</h3>
                            <div class="space-y-3 flex-1">
                                <button onClick="${()=>setCurrentTab('addForm')}" class="w-full p-4 rounded-xl bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 font-bold transition flex justify-between shadow-sm text-sm">

                                    <span>🗺️ បញ្ចូលតំបន់ & គោលដៅ</span> <span>+</span>
                                </button>
                                <button onClick="${()=>setCurrentTab('schedules')}" class="w-full p-4 rounded-xl bg-blue-50 hover:bg-blue-100 border border-blue-200 text-[#0067c0] font-bold transition flex justify-between shadow-sm text-sm">
                                    <span>📅 បញ្ចូលរៀបចំវេន</span> <span>+</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        const AdminAddForm = ({ data, updateData }) => {
            const handleRegister = (newGuard) => {
                // ១. កំណត់ទិន្នន័យ (Data Limitation) - បញ្ចូលបានតែ ៥ នាក់
                if (data.guards.length >= 5) {
                    alert('⚠️ ជំនាន់សាកល្បង (Demo) ៖ អនុញ្ញាតឲ្យមានសន្តិសុខត្រឹមតែ ៥ នាក់ប៉ុណ្ណោះក្នុងប្រព័ន្ធ!\n\nសូមទាក់ទងអ្នកអភិវឌ្ឍន៍ដើម្បីទទួលបានប្រព័ន្ធពេញលេញ។');
                    return;
                }
                
                updateData('guards', [...data.guards, newGuard]);
                alert('បញ្ជូលទិន្នន័យបុគ្គលិកថ្មីជោគជ័យ!');
            };
            return html`
                <div class="animate-fade-in max-w-4xl mx-auto">
                    <div class="win-mica p-5 md:p-8 rounded-3xl border border-white shadow-lg relative overflow-hidden">
                        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-xl text-sm font-bold mb-4 flex items-center gap-2">
                            <span>🔒</span> ជំនាន់សាកល្បង អនុញ្ញាតឲ្យបញ្ចូលបុគ្គលិកត្រឹមតែ ៥ នាក់ប៉ុណ្ណោះ (បច្ចុប្បន្នមាន ${data.guards.length}/5)
                        </div>
                        <h3 class="text-xl md:text-2xl font-bold text-emerald-700 mb-6 border-b border-emerald-100 pb-4 relative z-10">១. ទម្រង់សម្រាប់បញ្ចូលបុគ្គលិក/សន្តិសុខថ្មី (Registration Form)</h3>
                        <div class="bg-emerald-50/50 p-4 rounded-2xl border border-emerald-200 shadow-sm mb-6 relative z-10">
                            <label class="block text-sm font-bold text-emerald-700">✨ បំពេញទិន្នន័យ (Smart Form)</label>
                        </div>
                        <${RegistrationForm} guards="${data.guards}" onSubmit="${handleRegister}" isTab="${true}" />
                    </div>
                </div>
            `;
        };

        const AdminGuards = ({ data, updateData }) => {
            const [viewMode, setViewMode] = useState(null); // 'view' or 'edit' or 'idcard'
            const [selectedGuard, setSelectedGuard] = useState(null);

            const handlePrintAction = () => {
                setTimeout(() => {
                    const cardHtml = document.getElementById(`modal-id-card`).innerHTML;
                    const printWin = window.open('', '_blank');
                    printWin.document.write(`<html><head><title>ID Card</title><script src="https://cdn.tailwindcss.com"><\/script><style>body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:white;font-family:sans-serif;} .font-moul{font-family:serif;} .id-card-bg{background:linear-gradient(135deg,#0067c0 0%,#003366 100%);position:relative;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;}</style></head><body>${cardHtml}<script>window.onload=()=>setTimeout(()=>window.print(),500)<\/script></body></html>`);
                    printWin.document.close();
                }, 100);
            };

            const handleUpdateGuard = (updatedGuard) => {
                updateData('guards', data.guards.map(g => g.id === updatedGuard.id ? updatedGuard : g));
                setViewMode(null);
                alert('កែសម្រួលទិន្នន័យជោគជ័យ!');
            };

            return html`
                <div class="animate-fade-in max-w-6xl mx-auto">
                    <div class="win-mica p-5 md:p-8 rounded-3xl border border-white shadow-lg relative overflow-hidden">
                        <h3 class="text-xl font-bold text-[#0067c0] mb-6 border-b border-blue-100 pb-4 relative z-10">👮 បញ្ជីឈ្មោះ បុគ្គលិក/សន្តិសុខ</h3>
                        
                        <div class="bg-white/60 rounded-2xl border border-white shadow-inner overflow-x-auto">
                            <table class="w-full text-left border-collapse min-w-max">
                                <thead>
                                    <tr class="bg-slate-100/50 text-slate-600 border-b border-slate-200">
                                        <th class="py-3 px-4 font-bold text-sm">រូបថត</th>
                                        <th class="py-3 px-4 font-bold text-sm">ID</th>
                                        <th class="py-3 px-4 font-bold text-sm">ឈ្មោះ</th>
                                        <th class="py-3 px-4 font-bold text-sm">វេន</th>
                                        <th class="py-3 px-4 font-bold text-sm text-center">សកម្មភាព</th>
                                    </tr>
                                </thead>

                        </div>
                        <div class="bg-red-50 p-4 rounded-xl border border-red-100 text-sm">
                            <p class="text-red-600 font-bold"><span>🔒</span> មុខងារទាញយកទិន្នន័យត្រូវបានចាក់សោរ សម្រាប់តែជំនាន់ពេញលេញ (Full Version) ប៉ុណ្ណោះ។</p>
                        </div>
                    </div>

                    <!-- Submitted Guard Reports -->
                    <div class="win-mica p-5 md:p-8 rounded-3xl border border-white shadow-lg overflow-x-auto">
                        <h3 class="text-lg font-bold text-slate-800 mb-6 border-b pb-4">📋 របាយការណ៍សន្តិសុខដែលបានបញ្ជូន (Submitted Guard Reports)</h3>
                        <table class="w-full text-left border-collapse text-sm min-w-max">
                            <thead>
                                <tr class="bg-slate-100/50 text-slate-600 border-b border-slate-300">
                                    <th class="p-3 font-bold">កាលបរិច្ឆេទ</th>
                                    <th class="p-3 font-bold">ID សន្តិសុខ</th>
                                    <th class="p-3 font-bold">កម្រិតសភាពការណ៍ទូទៅ</th>
                                    <th class="p-3 font-bold text-center">សកម្មភាព</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.guardReports && data.guardReports.map(r => html`
                                    <tr class="border-b border-slate-100 hover:bg-white transition-colors">
                                        <td class="p-3">${r.date}</td>
                                        <td class="p-3 font-bold text-[#0067c0]">${r.guardId}</td>
                                        <td class="p-3">
                                            ${r.overallStatus === 'critical' ? html`<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full font-bold text-xs border border-red-200">🔴 មានហេតុការណ៍ធ្ងន់ធ្ងរ</span>` :
                                              r.overallStatus === 'warning' ? html`<span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full font-bold text-xs border border-orange-200">🟠 គួរប្រុងប្រយ័ត្ន</span>` :
                                              html`<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold text-xs border border-blue-200">🔵 សភាពការណ៍ធម្មតា</span>`}
                                        </td>
                                        <td class="p-3 text-center">
                                            <button onClick="${() => alert('ទិន្នន័យរបាយការណ៍ពេញលេញត្រូវបានកត់ត្រាទុកក្នុងប្រព័ន្ធដោយជោគជ័យ។\n\nចំណាំពីសន្តិសុខ: ' + (r.handover?.situation || 'គ្មានកំណត់ចំណាំ'))}" class="text-emerald-600 font-bold hover:underline bg-emerald-50 px-3 py-1.5 rounded-lg text-xs">👁️ មើលលម្អិត</button>
                                        </td>
                                    </tr>
                                `)}
                                ${(!data.guardReports || data.guardReports.length === 0) && html`<tr><td colSpan="4" class="p-6 text-center text-slate-500 font-bold">មិនទាន់មានរបាយការណ៍បញ្ជូនមកទេ</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        };

        const AdminSettings = ({ data, updateData, overwriteData }) => {
            const [set, setSet] = useState(data.settings);
            const hc = (k,v) => setSet({...set, [k]:v});
            const handleImg = async (e,k) => { const f=e.target.files[0]; if(f){ const b64=await fileToBase64(f); hc(k,b64); } };
            
            const exportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "kampot_security_backup_" + new Date().toISOString().split('T')[0] + ".json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if(importedData.guards && importedData.settings) {
                            overwriteData(importedData);
                        } else { alert('ឯកសារមិនត្រឹមត្រូវទេ!'); }
                    } catch(err) { alert('មានបញ្ហាក្នុងការអានឯកសារបម្រុងនេះ!'); }
                };
                reader.readAsText(file);
            };

            const resetAllData = () => {
                if(confirm('តើអ្នកពិតជាចង់សម្អាតទិន្នន័យទាំងអស់មែនទេ? សកម្មភាពនេះមិនអាចត្រឡប់វិញបានទេ។')) {
                    overwriteData(INITIAL_STATE);
                }
            };

            return html`
                <div class="animate-fade-in max-w-4xl mx-auto space-y-6">
                    <div class="win-mica p-5 md:p-8 rounded-3xl border border-white shadow-lg">
                        <h3 class="text-xl font-bold text-slate-800 mb-6 border-b pb-4">⚙️ ការកំណត់ប្រព័ន្ធ</h3>
                        <div class="bg-white/50 p-5 rounded-2xl border border-white shadow-inner grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <${Input} label="ឈ្មោះស្ថាប័ន" value="${set.institutionName}" onChange="${v=>hc('institutionName',v)}" />
                            <${Input} label="អាសយដ្ឋាន" value="${set.address}" onChange="${v=>hc('address',v)}" />
                            <${Input} label="ទូរស័ព្ទ" value="${set.phone}" onChange="${v=>hc('phone',v)}" />
                            <${Input} label="អ៊ីម៉ែល" value="${set.email}" onChange="${v=>hc('email',v)}" />
                            <${Input} label="ឈ្មោះប្រធានសាខា" value="${set.branchChiefName}" onChange="${v=>hc('branchChiefName',v)}" />
                            <${Input} label="តួនាទីប្រធានសាខា" value="${set.branchChiefTitle}" onChange="${v=>hc('branchChiefTitle',v)}" />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <div class="bg-white/50 p-4 rounded-2xl text-center border border-white shadow-inner">
                                <label class="block text-sm font-bold text-slate-700 mb-2">ឡូហ្គោស្ថាប័ន</label>
                                ${set.logo ? html`<img src="${set.logo}" class="h-16 mx-auto object-contain mb-3" />` : html`<div class="h-16 mb-3 text-slate-400 text-sm flex items-center justify-center">គ្មានឡូហ្គោ</div>`}
                                <input type="file" id="up-logo" class="hidden" onChange="${e=>handleImg(e,'logo')}" />
                                <div class="flex items-center justify-center gap-2">
                                    <${Button} variant="secondary" onClick="${()=>document.getElementById('up-logo').click()}">ជ្រើសរើសរូប</${Button}>
                                    ${set.logo && html`<${Button} variant="danger" onClick="${()=>hc('logo', '')}">លុបរូប</${Button}>`}
                                </div>
                            </div>
                            <div class="bg-white/50 p-4 rounded-2xl text-center border border-white shadow-inner">
                                <label class="block text-sm font-bold text-slate-700 mb-2">ហត្ថលេខា (សម្រាប់ PDF)</label>
                                ${set.signature ? html`<img src="${set.signature}" class="h-16 mx-auto object-contain mb-3" />` : html`<div class="h-16 mb-3 text-slate-400 text-sm flex items-center justify-center">គ្មានហត្ថលេខា</div>`}
                                <input type="file" id="up-sig" class="hidden" onChange="${e=>handleImg(e,'signature')}" />
                                <div class="flex items-center justify-center gap-2">
                                    <${Button} variant="secondary" onClick="${()=>document.getElementById('up-sig').click()}">ជ្រើសរើសរូប</${Button}>
                                    ${set.signature && html`<${Button} variant="danger" onClick="${()=>hc('signature', '')}">លុបរូប</${Button}>`}
                                </div>
                            </div>
                        </div>
                        <${Button} variant="primary" onClick="${()=>{updateData('settings',set); alert('រក្សាទុកជោគជ័យ!');}}" icon="💾">រក្សាទុកការកំណត់</${Button}>
                    </div>
                    
                    <!-- Advanced Data Management -->
                    <div class="win-mica p-5 md:p-8 rounded-3xl border border-rose-200 shadow-lg relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-rose-400/20 rounded-full blur-3xl"></div>
                        <h3 class="text-lg font-bold text-rose-700 mb-2 relative z-10">⚙️ ការកំណត់ប្រព័ន្ធកម្រិតខ្ពស់</h3>
                        <div class="bg-white/60 p-5 rounded-2xl border border-rose-100 shadow-inner relative z-10">
                            <h4 class="font-bold text-rose-600 mb-2 flex items-center gap-2"><span>🛡️</span> តំបន់គ្រប់គ្រងទិន្នន័យ (Data Management)</h4>
                            <p class="text-sm text-slate-600 mb-6">សូមប្រុងប្រយ័ត្នរាល់សកម្មភាពខាងក្រោម ព្រោះវានឹងប៉ះពាល់ដល់ទិន្នន័យក្នុងប្រព័ន្ធទាំងមូល។</p>
                            
                            <div class="flex flex-wrap gap-3">
                                <button onClick="${exportBackup}" class="win-btn-primary px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm">
                                    <span class="text-lg">💾</span> ទាញយកទិន្នន័យបម្រុង (Backup)
                                </button>
                                <label class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm cursor-pointer transition">
                                    <span class="text-lg">📂</span> បញ្ចូលទិន្នន័យ (Restore)
                                    <input type="file" accept=".json" class="hidden" onChange="${importBackup}" />
                                </label>
                                <button onClick="${resetAllData}" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm transition">
                                    <span class="text-lg">🗑️</span> សម្អាតទិន្នន័យទាំងអស់ (Reset)
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- Guard Dashboard ---
        const GuardDashboard = ({ guard, appData, updateData, onLogout }) => {
            const handleCheckIn = () => { updateData('checkIns', [...appData.checkIns, { id: generateId(), guardId: guard.id, timestamp: new Date().toISOString() }]); alert('បានចុះវត្តមានជោគជ័យ! ✔️'); };
            const mySchedule = appData.schedules.find(s => s.guardId === guard.id);
            const myZone = mySchedule ? appData.zones.find(z => z.id === mySchedule.zoneId) : null;
            const myLoc = myZone ? myZone.locations.find(l => l.id === mySchedule.locationId) : null;

            // Report Form State & Auto-Time Generation
            const [reportDate, setReportDate] = useState(new Date().toISOString().split('T')[0]);
            
            // Generate patrol times based on shift
            const isNightShift = mySchedule?.shift === 'night';
            const generatedTimes = isNightShift 
                ? ['ម៉ោង 6:00 pm', 'ម៉ោង 8:00 pm', 'ម៉ោង 10:00 pm', 'ម៉ោង 12:00 am', 'ម៉ោង 2:00 am', 'ម៉ោង 4:00 am', 'ម៉ោង 6:00 am']
                : ['ម៉ោង 6:00 am', 'ម៉ោង 8:00 am', 'ម៉ោង 10:00 am', 'ម៉ោង 12:00 pm', 'ម៉ោង 2:00 pm', 'ម៉ោង 4:00 pm', 'ម៉ោង 6:00 pm'];

            // Initialize patrols with status and notes
            const [patrols, setPatrols] = useState(generatedTimes.map(t => ({ time: t, status: 'normal', note: '' })));
            
            const updatePatrol = (index, field, value) => { 
                const newP = [...patrols]; 
                newP[index][field] = value; 
                setPatrols(newP); 
            };

            // Auto-fill location from Admin's schedule
            const autoLocation = myLoc?.name || '';
            const [incidents, setIncidents] = useState([{ time: '', location: autoLocation, desc: '' }, { time: '', location: autoLocation, desc: '' }, { time: '', location: autoLocation, desc: '' }]);
            const updateIncident = (index, field, value) => { const newI = [...incidents]; newI[index][field] = value; setIncidents(newI); };

            const [handover, setHandover] = useState({ 
                items: '', situation: '', requests: '', 
                signatureName: guard.surname + ' ' + guard.givenName,
                guardSignature: null,
                supervisorName: '',
                supervisorSignature: null
            });

            const handleGuardSigUpload = async (e) => {
                const file = e.target.files[0];
                if (file) { const b64 = await fileToBase64(file); setHandover({...handover, guardSignature: b64}); }
            };

            const handleSupervisorSigUpload = async (e) => {
                const file = e.target.files[0];
                if (file) { const b64 = await fileToBase64(file); setHandover({...handover, supervisorSignature: b64}); }
            };

            const handleSubmitReport = () => {
                // Calculate overall status to send to Admin
                const hasCritical = patrols.some(p => p.status === 'critical');
                const hasWarning = patrols.some(p => p.status === 'warning');
                const overallStatus = hasCritical ? 'critical' : (hasWarning ? 'warning' : 'normal');

                const newReport = { 
                    id: generateId(), 
                    guardId: guard.id, 
                    date: reportDate, 
                    patrols, 
                    incidents, 
                    handover, 
                    overallStatus,
                    timestamp: new Date().toISOString() 
                };
                updateData('guardReports', [...(appData.guardReports || []), newReport]);
                alert('របាយការណ៍ត្រូវបានបញ្ជូនទៅ Admin ដោយជោគជ័យ! ✅');
            };

            const handleExportImage = () => {
                const element = document.getElementById('guard-report-print-area');
                if(!element) return;
                
                // Hide 'no-print' elements temporarily for clean image
                const noPrintEls = element.querySelectorAll('.no-print');
                noPrintEls.forEach(el => el.style.display = 'none');

                html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Report_${guard.id}_${reportDate}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    // Restore 'no-print' elements
                    noPrintEls.forEach(el => el.style.display = '');
                });
            };

            const handlePrintPDF = () => {
                const printContent = document.getElementById('guard-report-print-area').innerHTML;
                const printWin = window.open('', '_blank');
                printWin.document.write(`
                    <html><head><title>Print Guard Report</title>
                    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Kantumruy Pro', 'Battambang', sans-serif; margin: 0; padding: 20px; font-size: 12px; }
                        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                        th, td { border: 1px solid #000; padding: 6px; text-align: center; }
                        .bg-green-100 { background-color: #dcfce7; }
                        .bg-pink-100 { background-color: #fce7f3; }
                        .bg-yellow-100 { background-color: #fef9c3; }
                        .text-blue-900 { color: #1e3a8a; }
                        .font-bold { font-weight: bold; }
                        h3 { font-size: 14px; margin-bottom: 10px; color: #1e3a8a; }
                        .no-print { display: none !important; }
                        textarea { border: none; resize: none; overflow: hidden; }
                        select { -webkit-appearance: none; appearance: none; border: none; background: transparent; }
                    </style>
                    </head><body>${printContent}<script>window.onload=()=>setTimeout(()=>window.print(),800)<\/script></body></html>
                `);
                printWin.document.close();
            };

            return html`
                <div class="flex h-screen w-full overflow-hidden win-bg bg-gradient-to-br from-cyan-100 via-purple-50 to-blue-100">
                    
                    <!-- Left Panel (Sidebar Profile Matching Image) -->
                    <div class="w-80 h-full p-6 flex flex-col items-center justify-between border-r border-slate-200 bg-gradient-to-b from-orange-50 via-white to-cyan-100 shrink-0 shadow-lg z-10 relative">
                        <div class="flex flex-col items-center w-full">
                            ${appData.settings.logo ? html`<img src="${appData.settings.logo}" class="h-20 w-auto object-contain mb-4 drop-shadow-md" />` : html`<div class="h-20 mb-4 text-4xl">🛡️</div>`}
                            <h2 class="text-xl font-bold text-[#0067c0] mb-8 text-center tracking-wide">ស្វាគមន៍, ${guard.id}</h2>
                            
                            <div class="relative mb-4 group cursor-pointer" onClick="${handleCheckIn}">
                                <div class="absolute inset-0 bg-emerald-400 rounded-full blur-xl opacity-50 group-hover:opacity-70 transition duration-500"></div>
                                <div class="relative w-44 h-44 bg-gradient-to-br from-emerald-400 to-emerald-500 rounded-full flex items-center justify-center shadow-[inset_0_-8px_16px_rgba(0,0,0,0.1),_0_8px_20px_rgba(34,197,94,0.4)] transition-transform transform hover:scale-105 active:scale-95 border-4 border-emerald-200">
                                    <svg class="w-24 h-24 text-white drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                            <p class="font-bold text-sm text-emerald-800 text-center mb-10">✔ ចុះទីនេះដើម្បី Check-in រៀងរាល់ ២ ម៉ោង</p>
                            
                            <!-- Location Box Matching Image -->
                            <div class="w-full bg-white/80 p-5 rounded-2xl border border-white shadow-sm text-center mb-4">
                                <p class="text-slate-800 font-bold mb-3 text-sm">គោលដៅការងារថ្ងៃនេះ:</p>
                                ${mySchedule ? html`
                                    <p class="font-bold text-[#0067c0] mb-1 text-lg uppercase truncate">${myLoc?.name || 'មិនមានគោលដៅ'}</p>
                                    <p class="text-xs text-slate-500 truncate">${myZone?.name || 'មិនមានតំបន់'}</p>
                                ` : html`<p class="text-slate-400 font-bold">មិនទាន់មានការចាត់តាំង</p>`}
                            </div>
                        </div>

                        <button onClick="${onLogout}" class="w-full bg-white border-2 border-red-100 text-red-600 px-4 py-3.5 rounded-2xl font-bold hover:bg-red-50 hover:border-red-200 transition shadow-sm flex items-center justify-center gap-3">
                            ចាកចេញពីប្រព័ន្ធ <span class="text-xl">🚪</span>
                        </button>
                    </div>

                    <!-- Right Panel (Report Form Area) -->
                    <div class="flex-1 h-full overflow-y-auto p-4 md:p-8 custom-scrollbar relative z-0">
                        <div class="max-w-6xl mx-auto flex justify-between items-center mb-6 bg-white/60 p-4 rounded-2xl border border-white shadow-sm backdrop-blur-md">
                            <h2 class="text-xl font-bold text-[#0067c0] flex items-center gap-3"><span class="text-2xl">📄</span> របាយការណ៍ការងារផ្ទាល់ខ្លួន</h2>
                            <div class="flex gap-2">
                                <button onClick="${handleSubmitReport}" class="win-btn-primary px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm">
                                    💾 បញ្ជូនរបាយការណ៍ទៅ Admin
                                </button>
                                <button onClick="${handleExportImage}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm transition">
                                    🖼️ PNG
                                </button>
                                <button onClick="${handlePrintPDF}" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm transition">
                                    🖨️ Print / PDF
                                </button>
                            </div>
                        </div>

                        <!-- REPORT PRINTABLE AREA -->
                        <div id="guard-report-print-area" class="max-w-6xl mx-auto bg-white shadow-2xl overflow-hidden border border-slate-200 font-sans">
                            
                            <!-- Header matching image -->

                                        <div class="h-20 w-full flex flex-col items-center justify-center relative mb-6">
                                            ${handover.supervisorSignature ? html`
                                                <img src="${handover.supervisorSignature}" class="h-full object-contain" />
                                                <button onClick="${()=>setHandover({...handover, supervisorSignature: null})}" class="absolute -bottom-4 text-red-500 text-[10px] no-print hover:underline bg-white/80 px-2 rounded-full">លុបរូប</button>
                                            ` : html`
                                                <input type="file" id="s-sig" class="hidden" accept="image/*" onChange="${handleSupervisorSigUpload}" />
                                                <button onClick="${()=>document.getElementById('s-sig').click()}" class="border border-[#0067c0] text-[#0067c0] px-4 py-2 rounded-xl text-xs no-print hover:bg-[#0067c0]/10 transition shadow-sm font-bold flex flex-col items-center gap-1">
                                                    <span>មុខងារទាញយកហត្ថលេខាពីកុំព្យូទ័រ</span>
                                                    <span class="text-lg">📤</span>

                                            `}

                                        <div class="w-full mt-auto flex flex-col items-center">
                                            <p class="mb-2">មានមុខងារទាញយកហត្ថលេខាពី កុំព្យូទ័រ</p>
                                            <div class="flex items-center gap-2">
                                                <span>ឈ្មោះ: </span>
                                                <input type="text" value="${handover.supervisorName}" onChange="${e=>setHandover({...handover, supervisorName: e.target.value})}" class="bg-transparent font-bold text-[#0067c0] w-32 border-b border-dashed border-[#0067c0] focus:outline-none text-center pb-1" placeholder="រង់ចាំការបំពេញ" />

                            </div>
                            
                        </div>
                        <div class="h-20"></div> <!-- spacer -->
                    </div>
                </div>
            `;
        };

        // --- Core App ---
        const App = () => {
            const [authState, setAuthState] = useState({ role: null, user: null });
            const [appData, setAppData] = useState(INITIAL_STATE);
            const [isLoaded, setIsLoaded] = useState(false);
            const [fbUser, setFbUser] = useState(null);

            // ៣. ថ្ងៃផុតកំណត់ (Time Expiration)
            const DEMO_EXPIRATION_DATE = new Date('2026-05-15T23:59:59').getTime(); // ថ្ងៃទី ១៥ ឧសភា ២០២៦

            if (Date.now() > DEMO_EXPIRATION_DATE) {
                return html`
                    <div class="h-screen flex items-center justify-center win-bg text-center p-4 z-50 relative">
                        <div class="bg-white/90 backdrop-blur-3xl p-10 rounded-3xl shadow-2xl max-w-lg border border-white">
                            <div class="text-8xl mb-6">⏳</div>
                            <h1 class="text-3xl font-moul text-[#d13438] mb-4 leading-relaxed">រយៈពេលសាកល្បងបានផុតកំណត់</h1>
                            <p class="text-slate-600 font-bold text-lg mb-8">កម្មវិធីនេះបានផុតកំណត់រយៈពេលសាកល្បង (Demo) ហើយ។</p>
                            <div class="bg-slate-100 p-4 rounded-xl mb-6 text-sm text-slate-700 text-left border border-slate-200">
                                <p class="mb-2"><b>លេខកូដប្រព័ន្ធ:</b> KSA-SYS-DEMO</p>
                                <p><b>ស្ថានភាព:</b> <span class="text-red-500 font-bold">EXPIRED</span></p>
                            </div>
                            <p class="text-[#0067c0] font-bold">សូមទាក់ទងអ្នកអភិវឌ្ឍន៍ (Developer) ដើម្បីដោះសោរ និងទទួលបានប្រព័ន្ធពេញលេញសម្រាប់ការប្រើប្រាស់ផ្លូវការ។</p>
                        </div>
                    </div>
                `;
            }

            // 1. Firebase Auth Init
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        // ព្យាយាមចូលប្រព័ន្ធ
                        await signInAnonymously(auth);
                    } catch (e) {
                        // យើងប្តូរពី console.error ទៅ console.warn ដើម្បីកុំឲ្យលោត Error ក្រហមរំខាន
                        console.warn("Firebase Auth មិនទាន់បានបើកទេ។ បន្តដោយមិនប្រើ Auth...", e);
                        if (isMounted) {
                            setFbUser({ uid: 'unauthenticated' });
                        }
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, u => {
                    if (isMounted && u) setFbUser(u);
                });
                
                return () => {
                    isMounted = false;
                    unsubscribe();
                };
            }, []);

            // 2. Firebase Data Sync
            useEffect(() => {
                if (!fbUser) return;
                
                const docRef = doc(db, 'kampot_db', 'main_state');
                const unsub = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        try {
                            const cloudData = JSON.parse(docSnap.data().dataPayload);
                            setAppData(prev => ({ ...prev, ...cloudData }));
                        } catch(e) { 
                            console.warn("Parse error", e); 
                        }
                    } else {
                        // Initialize database on first load if empty
                        setDoc(docRef, { dataPayload: JSON.stringify(INITIAL_STATE) }).catch(err => {
                            console.warn("Write error:", err);
                        });
                    }
                    setIsLoaded(true);
                }, (err) => {
                    console.warn("Snapshot error:", err);
                    if (err.code === 'permission-denied') {
                        alert("⚠️ ដើម្បីឲ្យ Database ដើរបាន សូមចូលទៅកាន់ Firebase Console -> Firestore Database -> Rules រួចប្តូរទៅ \n\nallow read, write: if true;");
                    }
                    setIsLoaded(true); // Fallback to let UI load
                });
                
                return () => unsub();
            }, [fbUser]);

            const updateData = useCallback((key, value) => {
                setAppData(prev => {
                    const newData = { ...prev, [key]: value };
                    if (fbUser) {
                        const docRef = doc(db, 'kampot_db', 'main_state');
                        setDoc(docRef, { dataPayload: JSON.stringify(newData) }).catch(e => console.warn("Update Error", e));
                    }
                    return newData;
                });
            }, [fbUser]);

            const overwriteData = useCallback((newData) => {
                setAppData(newData);
                if (fbUser) {
                    const docRef = doc(db, 'kampot_db', 'main_state');
                    setDoc(docRef, { dataPayload: JSON.stringify(newData) })
                        .then(() => { 
                            alert('Restore / Reset ជោគជ័យ!'); 
                            window.location.reload(); 
                        })
                        .catch(e => {
                            console.warn(e);
                            alert('មិនអាចរក្សាទុកបានទេ! សូមពិនិត្យមើល Firestore Rules។');
                        });
                }
            }, [fbUser]);

            if (!isLoaded) return html`
                <div class="h-screen flex items-center justify-center win-bg text-[#0067c0] font-bold text-xl">
                    <div class="animate-pulse flex flex-col items-center">
                        <span class="text-4xl mb-4">⏳</span>
                        <span>កំពុងភ្ជាប់ទៅកាន់ Cloud Database...</span>
                    </div>
                </div>
            `;
            
            if (!authState.role) return html`<${LoginScreen} onLogin="${setAuthState}" settings="${appData.settings}" />`;
            if (authState.role === 'admin') return html`<${AdminDashboard} appData="${appData}" updateData="${updateData}" overwriteData="${overwriteData}" onLogout="${() => setAuthState({role:null, user:null})}" />`;
            if (authState.role === 'guard') {
                const currentGuard = appData.guards.find(g => g.id === authState.user.id) || authState.user;
                return html`<${GuardDashboard} guard="${currentGuard}" appData="${appData}" updateData="${updateData}" onLogout="${() => setAuthState({role:null, user:null})}" />`;
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
